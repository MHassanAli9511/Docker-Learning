<!DOCTYPE html>
<html>
  <head>
    <title>CountTrak Pro: Visit Stats</title>
  <style>
    body {
    background-color: #0f172a;
    color: #f8fafc;
    font-family: Arial, sans-serif;
    padding: 40px;
    background-image: url('https://images.unsplash.com/photo-1777508921732-646da5428adf?q=80&w=1920&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    }

.card {
    background: rgba(10, 20, 55, 0.65);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    padding: 40px;
    max-width: 500px;
    margin: 100px auto;
}

h1 {
    color: #f8fafc;
    font-weight: 500;
    text-align: center;
}

p {
    color: #64748b;
    text-align: center;
}
    </style>

  </head>
  <body>
    <div class="card">
      <h1>Visit Stats</h1>
      <p>Number of Visits: {{ visit_count }}</p>
      <p> {{ visit_count_message }}</p>
      <p>Handled by : {{ hostname }}</p>
    </div>
  </body>
</html>
